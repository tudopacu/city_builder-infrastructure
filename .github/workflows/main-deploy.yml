name: Deploy Infrastructure Stack

on:
  push:
    branches: [ master ]
  repository_dispatch:
    types: [ update-image ]

jobs:
  helm-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Infrastructure Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.INFRA_PAT }}
          persist-credentials: true

      - name: Update target app variable file
        if: github.event_name == 'repository_dispatch'
        run: |
          APP_NAME="${{ github.event.client_payload.app }}"
          NEW_IMAGE="${{ github.event.client_payload.image }}"
          
          echo "Automating update for ${APP_NAME} to use image: ${NEW_IMAGE}"
          
          # 1. Cleanly check out a fresh copy of just that app's file to discard any rogue local disk edits
          git checkout master -- ${APP_NAME}.yaml || true
          
          # 2. Swap out the image configuration line explicitly
          sed -i "s|image:.*|image: ${NEW_IMAGE}|" ${APP_NAME}.yaml
          
          # 3. Configure Git local identities
          git config --global user.name "Infra Bot"
          git config --global user.email "infra-bot@home.ro"
          
          # 4. Only stage and commit the exact file that was modified by this specific event
          git add ${APP_NAME}.yaml
          git commit -m "automation: upgrade ${APP_NAME} image to ${NEW_IMAGE}"
          
          # 5. Pull any changes that happened while this job was running to avoid conflicts, then push
          git pull origin master --rebase
          git push origin master

      - name: Apply Helm Charts to Cluster
        run: |
          echo "Syncing entire cluster configuration layer..."
          
          helm upgrade --install golang-api ./charts/universal-app -f go-api.yaml
          helm upgrade --install react-frontend ./charts/universal-app -f react-frontend.yaml
          helm upgrade --install phaser-game ./charts/universal-app -f phaser-game.yaml
          helm upgrade --install yii2-cms ./charts/universal-app -f yii2-cms.yaml