appName: yii2-cms
image: ghcr.io/tudopacu/city_builder-cms:b4efc1ecb3971dd1a4e63e0893ad58152dde74fa
containerPort: 80
hostPort: 8084
replicas: 1
useSecrets: app-credentials

migrationCommand: "php yii migrate --interactive=0"

env:
  - name: YII_ENV
    value: "dev"
  - name: YII_DEBUG
    value: "1"
  - name: COOKIE_VALIDATION_KEY
    value: "generate-a-random-long-secret-string-here"