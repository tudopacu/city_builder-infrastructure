appName: yii2-cms
image: ghcr.io/tudopacu/city_builder-cms:f173dc43e61f996b0a6728226742ab2e4343fb0b
containerPort: 80         # Port NGINX/Apache listens to inside your PHP container
hostPort: 8084         # The physical host port you want to route to the CMS
replicas: 1

migrationCommand: "php yii migrate --interactive=0"

env:
  - name: DB_HOST
    value: "mysql-0.mysql-service"
  - name: DB_NAME
    value: "game"
  - name: DB_USER
    value: "root"
  - name: DB_PASSWORD
    value: "Hamham1miau!"
  - name: YII_ENV
    value: "prod"
  - name: YII_DEBUG
    value: "0"
  - name: COOKIE_VALIDATION_KEY
    value: "generate-a-random-long-secret-string-here"