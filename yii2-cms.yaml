appName: yii2-cms
image: ghcr.io/tudopacu/city_builder-cms:0b4dbcbe21bfc5c85933313e3dc063d05c4fe15e
containerPort: 80
hostPort: 8084
replicas: 1
useSecrets: app-credentials

migrationCommand: "php yii migrate --interactive=0"

env:
  - name: YII_ENV
    value: "dev"
  - name: YII_DEBUG
    value: "1"
  - name: COOKIE_VALIDATION_KEY
    value: "generate-a-random-long-secret-string-here"