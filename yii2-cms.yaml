appName: yii2-cms
image: ghcr.io/tudopacu/city_builder-cms:27e7acb08a985babeb58a3cd0a116a8bd422455e
containerPort: 80
hostPort: 8084
replicas: 1
useSecrets: app-credentials

migrationCommand: "php yii migrate --interactive=0"

env:
  - name: YII_ENV
    value: "dev"
  - name: YII_DEBUG
    value: "1"
  - name: COOKIE_VALIDATION_KEY
    value: "generate-a-random-long-secret-string-here"